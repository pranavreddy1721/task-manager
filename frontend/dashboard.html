<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager | Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <h1 class="logo">✅ TaskManager</h1>
    <div class="nav-right">
      <span id="userGreeting"></span>
      <button id="logoutBtn" class="btn-outline">Logout</button>
    </div>
  </nav>

  <main class="dashboard">
    <!-- Add / Edit Task Form -->
    <section class="task-form-card">
      <h2 id="formTitle">Add New Task</h2>
      <form id="taskForm">
        <input type="hidden" id="taskId" />

        <div class="form-row">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="e.g. Finish resume" required />
          </div>

          <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="dueDate">Due Date</label>
            <input type="date" id="dueDate" />
          </div>

          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option value="Pending" selected>Pending</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="2" placeholder="Optional details..."></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" id="submitBtn">Add Task</button>
          <button type="button" class="btn-outline" id="cancelEditBtn" style="display:none;">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Filters -->
    <section class="filters">
      <input type="text" id="searchInput" placeholder="🔍 Search tasks by title..." />
      <select id="filterStatus">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
      </select>
      <select id="filterPriority">
        <option value="">All Priority</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </section>

    <!-- Task List -->
    <section class="task-list" id="taskList">
      <!-- Tasks get rendered here by JS -->
      <p class="empty-state" id="emptyState">No tasks yet. Add your first task above 👆</p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
